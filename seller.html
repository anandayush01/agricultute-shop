<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Pari - Seller Dashboard</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        .seller-form {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .preview-image {
            max-width: 200px;
            max-height: 200px;
            margin-top: 10px;
        }
        .seller-header {
            background: #343a40;
            color: white;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        .btn-custom {
            background-color: #ff5e62;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background-color: #ff3b40;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Agri Pari</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="agricomm.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="products.html">Products</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="seller.html">Seller Dashboard</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="seller-header text-center">
        <h1>Seller Dashboard</h1>
        <p>Add your products to our marketplace</p>
    </div>

    <div class="container">
        <div class="seller-form">
            <h3 class="mb-4">Add New Product</h3>
            <form id="productForm" onsubmit="return addProduct(event)">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" class="form-control" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">Product Description</label>
                    <textarea class="form-control" id="productDescription" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price (₹)</label>
                    <input type="number" class="form-control" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label for="productImage">Product Image URL</label>
                    <input type="url" class="form-control" id="productImage" required>
                    <img id="imagePreview" class="preview-image d-none">
                </div>
                <div class="form-group">
                    <label for="sellerName">Seller Name</label>
                    <input type="text" class="form-control" id="sellerName" required>
                </div>
                <div class="form-group">
                    <label for="sellerContact">Contact Number</label>
                    <input type="tel" class="form-control" id="sellerContact" required>
                </div>
                <button type="submit" class="btn btn-custom">Add Product</button>
            </form>
        </div>
    </div>

    <div class="footer bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2025 Agri Pari - All Rights Reserved</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script>
        // Preview image when URL is entered
        document.getElementById('productImage').addEventListener('input', function(e) {
            const preview = document.getElementById('imagePreview');
            preview.src = e.target.value;
            preview.classList.remove('d-none');
        });

        function addProduct(event) {
            event.preventDefault();
            
            const product = {
                name: document.getElementById('productName').value,
                description: document.getElementById('productDescription').value,
                price: document.getElementById('productPrice').value,
                image: document.getElementById('productImage').value,
                sellerName: document.getElementById('sellerName').value,
                sellerContact: document.getElementById('sellerContact').value,
                dateAdded: new Date().toISOString()
            };

            // Get existing products from localStorage
            let products = JSON.parse(localStorage.getItem('sellerProducts') || '[]');
            products.push(product);
            
            // Save to localStorage
            localStorage.setItem('sellerProducts', JSON.stringify(products));

            alert('Product added successfully!');
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').classList.add('d-none');
            
            return false;
        }
    </script>
</body>
</html>
