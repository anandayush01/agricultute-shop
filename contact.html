<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - AgriTech</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    /* Background video */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      z-index: -3;
      filter: brightness(0.4);
      background-color: black;
    }

    /* Glowing gradient animated overlay */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, rgba(255,255,255,0.1), rgba(0,0,255,0.1), rgba(0,255,0,0.1), rgba(255,0,0,0.1));
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      z-index: -2;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating icons */
    .floating-symbols .symbol {
      position: absolute;
      width: 40px;
      opacity: 0.6;
      animation: float 6s ease-in-out infinite;
    }

    .symbol:nth-child(1) { top: 15%; left: 5%; }
    .symbol:nth-child(2) { top: 30%; left: 80%; }
    .symbol:nth-child(3) { top: 60%; left: 15%; }
    .symbol:nth-child(4) { top: 75%; left: 70%; }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }

    /* Centered section */
    .center-content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
      color: #fff;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 20px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px #007bff, 0 0 10px #007bff; }
      100% { text-shadow: 0 0 20px #00f0ff, 0 0 30px #00f0ff; }
    }

    .contact-button {
      padding: 12px 30px;
      border-radius: 50px;
      background-color: #007bff;
      color: #fff;
      font-weight: bold;
      border: none;
      transition: background 0.3s;
      font-size: 1.2rem;
    }

    .contact-button:hover {
      background-color: #0056b3;
    }

    /* Contact Form Styling inside Offcanvas */
    .offcanvas-body {
      padding: 30px;
    }

    .form-control {
      border-radius: 50px;
      padding: 12px 20px;
      border: 2px solid #ddd;
    }

    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
    }

    .btn-submit {
      width: 100%;
      border-radius: 50px;
      padding: 12px;
      font-weight: bold;
      background: #007bff;
      color: white;
      border: none;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background: #0056b3;
    }

    /* Custom Alert */
    .custom-alert {
      position: fixed;
      top: 30px;
      right: 30px;
      background-color: #28a745;
      color: white;
      padding: 15px 25px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      animation: fadeSlide 4s forwards;
      z-index: 9999;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(-20px); }
      10%, 90% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>
<body>

  <!-- Background Video -->
  <video autoplay muted loop class="video-bg">
    <source src="https://v.ftcdn.net/03/63/62/56/700_F_363625670_AoKiUxKQYC20yr3b3nlHTQqMPEv6q5tq_ST.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Animated background -->
  <div class="animated-bg"></div>

  <!-- Floating icons -->
  <div class="floating-symbols">
    <img src="https://img.icons8.com/fluency/48/plant-under-sun.png" class="symbol" />
    <img src="https://img.icons8.com/fluency/48/tractor.png" class="symbol" />
    <img src="https://img.icons8.com/color/48/watering-can.png" class="symbol" />
    <img src="https://img.icons8.com/color/48/wheat.png" class="symbol" />
  </div>

  <!-- Centered Contact -->
  <div class="center-content">
    <h1>📨 Contact Us</h1>
    <button class="contact-button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasContact">Get In Touch</button>
  </div>

  <!-- Offcanvas Contact Form -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasContact" aria-labelledby="offcanvasContactLabel">
    <div class="offcanvas-header">
      <h5 id="offcanvasContactLabel">Get in Touch</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <form id="contactForm">
        <div class="mb-3">
          <label for="name" class="form-label">Name <span class="badge bg-danger">Required</span></label>
          <input type="text" class="form-control" id="name" placeholder="Enter your name" required />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email <span class="badge bg-danger">Required</span></label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required />
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="4" placeholder="Enter your message"></textarea>
        </div>
        <button type="submit" class="btn btn-submit">Send Message</button>
      </form>
    </div>
  </div>

  <!-- Custom Alert -->
  <div id="alertBox" class="custom-alert" style="display: none;">Your message has been sent!</div>

  <!-- Bootstrap JS and Script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('contactForm');
    const alertBox = document.getElementById('alertBox');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!name || !email) {
        alert('Please fill in the required fields.');
        return;
      }

      alertBox.style.display = 'block';
      form.reset();

      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 4000);
    });
  </script>

</body>
</html>
